name: Release

# Triggered when a version tag is pushed (e.g. v1.0, v1.2.3)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build-and-release:
    name: Build plugin package and publish release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve version from the tag name ──────────────────────────────
      - name: Set version variable
        id: vars
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # ── 3. Assemble the installable plugin package ────────────────────────
      #    Structure: nfs_free/<plugin files>
      #    This matches the directory aaPanel expects at:
      #    /www/server/panel/plugin/nfs_free/
      - name: Build plugin zip
        run: |
          mkdir -p dist/nfs_free/config

          # Core backend and scripts
          cp nfs_free_main.py   dist/nfs_free/
          cp nfs_free_service   dist/nfs_free/
          cp install.sh         dist/nfs_free/
          cp init.sh            dist/nfs_free/
          cp repair.sh          dist/nfs_free/
          cp upgrade.sh         dist/nfs_free/

          # Panel metadata and UI
          cp info.json          dist/nfs_free/
          cp icon.png           dist/nfs_free/
          cp index.html         dist/nfs_free/

          # License
          cp LICENSE            dist/nfs_free/

          # Config directory with empty initial state
          cp config/*.json      dist/nfs_free/config/

          # Stamp the version into info.json
          sed -i "s/\"versions\": \"[^\"]*\"/\"versions\": \"${{ steps.vars.outputs.VERSION }}\"/" \
            dist/nfs_free/info.json

          # Create the zip with nfs_free/ at the root (aaPanel convention)
          cd dist
          zip -r "../nfs_free-${{ steps.vars.outputs.VERSION }}.zip" nfs_free/

          echo "Package contents:"
          unzip -l "../nfs_free-${{ steps.vars.outputs.VERSION }}.zip"

      # ── 4. Extract release notes from CHANGELOG.md ───────────────────────
      - name: Extract changelog notes
        id: notes
        run: |
          VER="${{ steps.vars.outputs.VERSION }}"
          VER="${VER#v}"   # strip leading 'v'  →  v1.2 → 1.2
          NOTES=$(awk "/^## \[$VER\]/{flag=1; next} /^## \[/{if(flag) exit} flag" docs/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to avoid quoting issues with multiline strings
          echo "$NOTES" > release_notes.md

      # ── 5. Publish the GitHub release with the zip attached ───────────────
      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.vars.outputs.VERSION }}" \
            "nfs_free-${{ steps.vars.outputs.VERSION }}.zip" \
            --title "NFS Free Edition ${{ steps.vars.outputs.VERSION }}" \
            --notes-file release_notes.md \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
